<section id="section-introduction-to-school">
    <div class="page page--overview" data-toc="Giới thiệu trường">
        <div class="overview__media" data-animate="fadeInLeft">
            <span class="tag-badge overview__tag">
                <i class="bi bi-chevron-double-right"></i>
                <span data-school-tag></span>
            </span>
            <img data-school-image alt="" src="">
        </div>

        <div class="overview__content" data-animate="fadeInRight">
            <p class="overview__eyebrow" data-school-eyebrow></p>
            <h2 class="overview__heading" data-school-heading></h2>
            <div class="overview__text" data-school-overview></div>
        </div>
    </div>

    <div class="page page--stats">
        <div class="stats__content" data-animate="fadeInLeft">
            <p class="overview__eyebrow" data-school-eyebrow-2></p>
            <h2 class="stats__heading" data-school-heading-2></h2>
            <div class="stats__summary" data-school-summary></div>
            <ul class="stats__majors" data-school-majors></ul>
            <p class="stats__list-title">Trường có:</p>
            <ul class="stats__list" data-school-stats></ul>
            <p class="stats__source" data-school-source></p>
        </div>

        <div class="stats__media" data-animate="fadeInRight">
            <img data-school-stats-image alt="" src="">
        </div>
    </div>
</section>
