<section id="section-introduction-to-mpclub">
    <div class="page page--mpclub-overview" data-toc="Giới thiệu CLB">
        <div class="mpclub__media" data-animate="fadeInLeft">
            <span class="tag-badge mpclub__tag">
                <i class="bi bi-chevron-double-right"></i>
                <span data-club-tag></span>
            </span>
            <img data-club-image alt="" src="">
        </div>

        <div class="mpclub__content" data-animate="fadeInRight">
            <p class="mpclub__eyebrow" data-club-eyebrow></p>
            <h2 class="mpclub__heading" data-club-heading></h2>
            <p class="mpclub__meta" data-club-meta></p>
            <div class="mpclub__text" data-club-overview></div>
            <blockquote class="mpclub__mission" data-club-mission></blockquote>

            <ul class="mpclub__stats" data-club-stats></ul>

            <div class="mpclub__socials" data-club-socials></div>
        </div>
    </div>

    <!-- Trang 2: hoat dong trong tam, du lieu (tieu de/mo ta/anh) lay tu
         mang "activities" trong club.json - moi hoat dong co the co 0-nhieu
         anh minh hoa (data-lightbox), them anh thi chi can sua club.json -->
    <div class="page page--mpclub-activities">
        <div class="mpclub-activities__header" data-animate="fadeInLeft">
            <p class="mpclub__eyebrow" data-club-eyebrow-2></p>
            <h2 class="mpclub-activities__heading" data-club-activities-heading></h2>
        </div>
        <div class="mpclub-activities__grid" data-club-activities></div>
    </div>
</section>
