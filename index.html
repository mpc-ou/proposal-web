<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposals - MPC Club</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        header {
            padding: 32px 0 24px;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111;
        }

        header p {
            font-size: 0.875rem;
            color: #666;
            margin-top: 4px;
        }

        .proposal-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .proposal-card {
            display: block;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 16px 20px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .proposal-card:hover,
        .proposal-card:focus-visible {
            border-color: #999;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            outline: none;
        }

        .proposal-card:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }

        .proposal-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #111;
        }

        .proposal-org {
            font-size: 0.825rem;
            color: #666;
            margin-top: 2px;
        }

        .proposal-meta {
            font-size: 0.75rem;
            color: #999;
            margin-top: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 16px;
            color: #888;
        }

        .empty-state p { margin-bottom: 8px; }

        .error-state {
            background: #fff3f3;
            border: 1px solid #fcc;
            border-radius: 6px;
            padding: 16px 20px;
            color: #b00;
            font-size: 0.875rem;
        }

        .error-state summary { cursor: pointer; font-weight: 600; }
        .error-state pre { margin-top: 8px; font-size: 0.75rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Danh sách Proposal</h1>
            <p>MPC Club &middot; Khoa CNTT &middot; Trường Đại học Mở TP.HCM</p>
        </header>

        <div id="proposalList" class="proposal-list" aria-live="polite">
            <div class="empty-state"><p>Đang tải&hellip;</p></div>
        </div>
    </div>

    <script>
    (async function () {
        const listEl = document.getElementById("proposalList");

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function renderEmpty() {
            listEl.innerHTML = '<div class="empty-state"><p>Chưa có proposal nào.</p></div>';
        }

        function renderError(msg, detail) {
            listEl.innerHTML = '<details class="error-state"><summary>' + escapeHtml(msg) + '</summary><pre>' + escapeHtml(detail) + '</pre></details>';
        }

        function renderProposals(proposals) {
            if (!proposals || proposals.length === 0) {
                renderEmpty();
                return;
            }

            listEl.innerHTML = proposals.map(function (p) {
                var name = escapeHtml(p.name || p.id || "Không tên");
                var org  = escapeHtml(p.organization || "");
                var date = escapeHtml((p.lastModified || "").slice(0, 10));

                return (
                    '<a class="proposal-card" href="' + escapeHtml(p.path) + '">' +
                        '<div class="proposal-name">' + name + '</div>' +
                        (org ? '<div class="proposal-org">' + org + '</div>' : '') +
                        (date ? '<div class="proposal-meta">Cập nhật: ' + date + '</div>' : '') +
                    '</a>'
                );
            }).join("");
        }

        try {
            const res = await fetch("./proposal-list.json");
            if (!res.ok) {
                renderError("Không tải được danh sách proposal (HTTP " + res.status + ").", "File proposal-list.json có thể chưa được tạo. Hãy chạy CI/CD hoặc tạo thủ công.");
                return;
            }
            const data = await res.json();
            renderProposals(data.proposals);
        } catch (err) {
            renderError("Lỗi khi tải danh sách proposal.", String(err));
        }
    })();
    </script>
</body>
</html>
